{% extends "base.html" %}

{% block content %}
<div class="interview-container" style="max-width: 800px; margin: 0 auto; animation: fadeIn 0.5s ease;">
    <div class="roadmap-header-centered" style="text-align: center; margin-bottom: 2rem;">
        <h1 class="roadmap-title" style="font-size: 2.2rem; font-weight: 800;">{{ skill_title }} Interview Practice</h1>
        <p style="color: var(--text-secondary); font-size: 1.1rem;">Test your knowledge with real interview questions.</p>
    </div>

    <!-- Question Card -->
    <div class="glass-card" style="padding: 2.5rem; position: relative; background: var(--card-bg); border-radius: 16px; box-shadow: var(--shadow-md); border: 1px solid var(--border-color);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <span style="font-weight: 600; color: var(--primary-color); font-size: 1.1rem;" id="qCounter">Question 1 of X</span>
            <span class="badge" id="difficultyBadge" style="display: none; padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; background: rgba(108, 99, 255, 0.1); color: var(--primary-color);">Difficulty</span>
        </div>
        
        <h2 id="qText" style="font-size: 1.4rem; line-height: 1.5; margin-bottom: 2rem; color: var(--text-primary);">Loading question...</h2>

        <div class="answer-section">
            <textarea id="answerInput" class="form-control" rows="6" placeholder="Type your answer here..." style="width: 100%; border-radius: 12px; padding: 1rem; resize: vertical; margin-bottom: 1.5rem; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-primary); font-family: inherit; font-size: 1rem;"></textarea>
            
            <button id="submitBtn" class="btn-gradient" style="width: 100%; padding: 1rem; border-radius: 12px; font-size: 1.1rem; display: flex; justify-content: center; align-items: center; gap: 10px;" onclick="submitAnswer()">
                <span id="submitText">Submit Answer</span>
                <i class="fa-solid fa-spinner fa-spin" id="submitLoader" style="display: none;"></i>
            </button>
        </div>

        <!-- Feedback Section (Hidden initially) -->
        <div id="feedbackSection" style="display: none; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(108, 99, 255, 0.1);">
            <div style="background: rgba(16, 185, 129, 0.05); border-left: 4px solid #10b981; padding: 1.2rem; border-radius: 8px; margin-bottom: 1.5rem;">
                <h4 style="color: #10b981; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px;"><i class="fa-solid fa-comment-dots"></i> AI Feedback</h4>
                <p id="feedbackText" style="color: var(--text-primary); line-height: 1.6;"></p>
            </div>
            
            <div style="background: rgba(108, 99, 255, 0.05); border-left: 4px solid var(--primary-color); padding: 1.2rem; border-radius: 8px; margin-bottom: 2rem;">
                <h4 style="color: var(--primary-color); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px;"><i class="fa-solid fa-lightbulb"></i> Ideal Answer</h4>
                <p id="idealText" style="color: var(--text-primary); line-height: 1.6;"></p>
            </div>

            <div style="text-align: right;">
                <button id="nextBtn" class="btn-secondary" style="padding: 0.8rem 1.8rem; border-radius: 8px;" onclick="nextQuestion()">Next Question <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = {{ questions | tojson | safe }};
    const skillName = "{{ skill_query }}";
    let currentIndex = 0;

    const qCounter = document.getElementById('qCounter');
    const qText = document.getElementById('qText');
    const answerInput = document.getElementById('answerInput');
    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const submitLoader = document.getElementById('submitLoader');
    const feedbackSection = document.getElementById('feedbackSection');
    const feedbackText = document.getElementById('feedbackText');
    const idealText = document.getElementById('idealText');
    const difficultyBadge = document.getElementById('difficultyBadge');
    const nextBtn = document.getElementById('nextBtn');

    function loadQuestion() {
        if (!questions || questions.length === 0) {
            qText.innerHTML = "No questions discovered for this skill.";
            answerInput.style.display = 'none';
            submitBtn.style.display = 'none';
            return;
        }

        if (currentIndex >= questions.length) {
            window.location.href = "{{ url_for('roadmap', skill=skill_query) }}";
            return;
        }
        
        // Reset UI
        qCounter.innerText = `Question ${currentIndex + 1} of ${questions.length}`;
        qText.innerHTML = questions[currentIndex];
        answerInput.value = '';
        answerInput.disabled = false;
        submitBtn.style.display = 'flex';
        feedbackSection.style.display = 'none';
        difficultyBadge.style.display = 'none';
        
        if (currentIndex === questions.length - 1) {
            nextBtn.innerHTML = 'Finish Practice <i class="fa-solid fa-flag-checkered"></i>';
        }
    }

    async function submitAnswer() {
        const answer = answerInput.value.trim();
        if (!answer) {
            alert("Please type an answer before submitting!");
            return;
        }

        // UI Loading State
        answerInput.disabled = true;
        submitBtn.disabled = true;
        submitText.innerText = "Evaluating...";
        submitLoader.style.display = 'block';

        try {
            const res = await fetch("{{ url_for('evaluate_answer') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    skill: skillName,
                    question: questions[currentIndex],
                    answer: answer
                })
            });
            const data = await res.json();
            
            // Show Feedback
            feedbackText.innerText = data.feedback || "Good effort.";
            idealText.innerText = data.correct_answer || "N/A";
            
            difficultyBadge.innerText = `Difficulty: ${data.difficulty || 'Medium'}`;
            difficultyBadge.style.display = 'block';
            
            let color = 'var(--primary-color)';
            let bg = 'rgba(108, 99, 255, 0.1)';
            if (data.difficulty && data.difficulty.toLowerCase().includes('hard')) { color = '#ef4444'; bg = 'rgba(239, 68, 68, 0.1)'; }
            else if (data.difficulty && data.difficulty.toLowerCase().includes('easy')) { color = '#10b981'; bg = 'rgba(16, 185, 129, 0.1)'; }
            else if (data.difficulty && data.difficulty.toLowerCase().includes('unknown')) { difficultyBadge.style.display = 'none'; }
            
            difficultyBadge.style.color = color;
            difficultyBadge.style.background = bg;

            submitBtn.style.display = 'none';
            feedbackSection.style.display = 'block';
            
        } catch (err) {
            console.error(err);
            alert("Network error evaluating answer!");
            answerInput.disabled = false;
        } finally {
            submitBtn.disabled = false;
            submitText.innerText = "Submit Answer";
            submitLoader.style.display = 'none';
        }
    }

    function nextQuestion() {
        currentIndex++;
        loadQuestion();
    }

    // Initialize
    loadQuestion();
</script>
{% endblock %}
