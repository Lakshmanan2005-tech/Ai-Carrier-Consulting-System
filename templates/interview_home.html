{% extends "base.html" %}

{% block content %}
<div class="interview-home-container" style="max-width: 900px; margin: 0 auto; padding-top: 2rem; animation: fadeIn 0.6s ease;">
    <!-- AI Interview Practice Simulator -->
    <div class="dashboard-hero-card" style="padding: 3rem 2.5rem; background: linear-gradient(135deg, rgba(108, 99, 255, 0.08) 0%, rgba(74, 144, 226, 0.08) 100%); border: 1px solid rgba(108, 99, 255, 0.2);">
        <h2 style="font-size: 2.2rem; margin-bottom: 1rem; color: var(--text-primary); text-align: center;"><i class="fa-solid fa-microphone" style="color: var(--primary-color);"></i> AI Interview Practice Simulator</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem; font-size: 1.15rem; text-align: center;">Sharpen your skills with realistic interview questions and get instant AI feedback on your answers.</p>
        <form action="{{ url_for('interview_practice') }}" method="GET" class="search-form" style="max-width: 650px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-radius: 40px; background: var(--bg-color);">
            <i class="fa-solid fa-laptop-code search-icon"></i>
            <input type="text" name="skill" class="search-input" placeholder="What skill do you want to practice? (e.g., Python, UI/UX)" required style="border-color: rgba(108, 99, 255, 0.3);">
            <button type="submit" class="btn-gradient">Start Practice</button>
        </form>
        
        <div style="margin-top: 3rem; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1rem;">Popular Interview Topics</p>
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <a href="{{ url_for('interview_practice', skill='Python') }}" class="badge" style="padding: 0.6rem 1.2rem; border-radius: 20px; background: var(--card-hover-bg); color: var(--text-primary); border: 1px solid var(--border-color); font-weight: 500;">Python</a>
                <a href="{{ url_for('interview_practice', skill='Java') }}" class="badge" style="padding: 0.6rem 1.2rem; border-radius: 20px; background: var(--card-hover-bg); color: var(--text-primary); border: 1px solid var(--border-color); font-weight: 500;">Java</a>
                <a href="{{ url_for('interview_practice', skill='React') }}" class="badge" style="padding: 0.6rem 1.2rem; border-radius: 20px; background: var(--card-hover-bg); color: var(--text-primary); border: 1px solid var(--border-color); font-weight: 500;">React</a>
                <a href="{{ url_for('interview_practice', skill='SQL') }}" class="badge" style="padding: 0.6rem 1.2rem; border-radius: 20px; background: var(--card-hover-bg); color: var(--text-primary); border: 1px solid var(--border-color); font-weight: 500;">SQL</a>
                <a href="{{ url_for('interview_practice', skill='Cyber Security') }}" class="badge" style="padding: 0.6rem 1.2rem; border-radius: 20px; background: var(--card-hover-bg); color: var(--text-primary); border: 1px solid var(--border-color); font-weight: 500;">Cyber Security</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
